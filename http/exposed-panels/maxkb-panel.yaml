id: maxkb-panel

info:
  name: MaxKB Panel - Detect
  author: rxerium
  severity: info
  description: |
    MaxKB, an open-source RAG-based knowledge base and LLM chatbot platform, was detected.
  reference:
    - https://github.com/1Panel-dev/MaxKB
  metadata:
    verified: true
    max-request: 1
    vendor: 1panel
    product: maxkb
    shodan-query: http.title:"MaxKB"
  tags: panel,maxkb,ai,llm,rag,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "<title>MaxKB</title>"

      - type: status
        status:
          - 200
