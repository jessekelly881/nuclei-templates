id: knime-server-panel

info:
  name: KNIME Server / Business Hub WebPortal - Detect
  author: rxerium
  severity: info
  description: |
    KNIME Server (and its successor KNIME Business Hub) is a commercial platform
    from KNIME AG for deploying, executing, and managing data-science and machine
    learning workflows built in the KNIME Analytics Platform. It exposes a browser
    based WebPortal, typically reachable at /knime or /webportal, for running and
    scheduling workflows and viewing results without the desktop client. This
    template detects exposed WebPortal login pages, including white-labeled/rebranded
    deployments, via their underlying static asset paths.
  reference:
    - https://www.knime.com/knime-software/knime-server
    - https://www.knime.com/knime-business-hub
    - https://docs.knime.com/latest/business_hub_admin_guide/index.html
  metadata:
    verified: true
    max-request: 1
    vendor: knime
    product: knime_server
    shodan-query: 'html:"knime"'
  tags: panel,knime,ml,ai,data-science,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"
    host-redirects: true
    max-redirects: 5
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "webportal/_nuxt/theme/favicon"
          - "_login/_nuxt"
        condition: and
      - type: status
        status:
          - 200
