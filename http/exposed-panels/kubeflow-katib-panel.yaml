id: kubeflow-katib-panel

info:
  name: Kubeflow Katib Panel - Detect
  author: rxerium
  severity: info
  description: |
    Kubeflow Katib, a Kubernetes-native project for automated machine learning (AutoML) that performs hyperparameter tuning, early stopping, and neural architecture search, was detected. Its web UI is normally served under the /katib/ path behind the Kubeflow Central Dashboard, fronted by an Istio/OIDC auth proxy, so unauthenticated exposure is uncommon but was identified on this instance.
  reference:
    - https://github.com/kubeflow/katib
    - https://www.kubeflow.org/docs/components/katib/
  metadata:
    verified: true
    max-request: 1
    vendor: kubeflow
    product: katib
    shodan-query: 'html:"dashboard_lib.bundle.js"'
  tags: panel,kubeflow-katib,ml,ai,mlops,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}/katib/"

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - 'base href="/katib/"'
          - "/katib/static/"
        condition: and

      - type: status
        status:
          - 200
