id: determined-ai-panel

info:
  name: Determined AI Panel - Detect
  author: rxerium
  severity: info
  description: |
    Determined AI is an open-source deep learning training platform that provides
    distributed training, hyperparameter tuning, and experiment tracking through a
    web-based UI and a REST/gRPC-gateway API served by the "master" component. This
    template detects exposed Determined AI WebUI instances by matching the
    application title and meta description served at the application root.
  reference:
    - https://github.com/determined-ai/determined
    - https://docs.determined.ai
  metadata:
    verified: true
    max-request: 1
    vendor: determined-ai
    product: determined
    shodan-query: 'html:"Determined Deep Learning Training Platform"'
  tags: panel,determined-ai,ml,ai,mlops,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"
    host-redirects: true
    max-redirects: 2
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "Determined Deep Learning Training Platform"
          - "<title>Determined</title>"
        condition: and
      - type: status
        status:
          - 200
