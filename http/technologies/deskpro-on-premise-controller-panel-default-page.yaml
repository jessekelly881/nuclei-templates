id: deskpro-on-premise-controller-panel-default-page

info:
  name: Deskpro On-Premise Controller - Default Page Detect
  author: Th3l0newolf
  severity: info
  description: |
    Deskpro On-Premise Controller default page detected.
  classification:
    cvss-metrics: CVSS:3.0/AV:N/AC:L/PR:N/UI:N/S:U/C:N/I:N/A:N
    cwe-id: CWE-200
  metadata:
    max-request: 1
    verified: true
    shodan-query: html:"Deskpro On-Premise Controller"
  tags: panel,deskpro,default-page,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    redirects: true
    max-redirects: 2

    matchers:
      - type: dsl
        dsl:
          - 'status_code == 200'
          - 'contains(body, "<title>Deskpro On-Premise Controller</title>")'
          - 'contains(body, "OPC Default Page")'
          - 'contains(body, "This page is generated by")'
          - 'contains(body, "https://www.deskpro.com/")'
          - 'contains(body, "there is no instance available on this IP address/port")'
          - 'contains(body, "Log in to Deskpro On-Premise Controller")'
        condition: and
