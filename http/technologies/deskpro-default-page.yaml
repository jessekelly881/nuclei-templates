id: deskpro-default-page

info:
  name: Deskpro Private Controller - Default Page Detect
  author: Th3l0newolf
  severity: info
  description: |
    Deskpro Private Controller default page detected.
  classification:
    cvss-metrics: CVSS:3.0/AV:N/AC:L/PR:N/UI:N/S:U/C:N/I:N/A:N
    cwe-id: CWE-200
  metadata:
    max-request: 1
    verified: true
    shodan-query: html:"Deskpro Private Controller"
  tags: tech,deskpro,default-page,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    redirects: true
    max-redirects: 2

    matchers:
      - type: dsl
        dsl:
          - 'status_code == 200'
          - 'contains_any(body, "<title>Deskpro Private Controller</title>","DPC Default Page")'
        condition: and
