id: bitnami-apache-solr-panel

info:
  name: Bitnami Apache Solr Stack - Panel Detect
  author: Th3l0newolf
  severity: info
  description: |
    Bitnami Apache Solr Stack welcome page was discovered.
  classification:
    cvss-metrics: CVSS:3.0/AV:N/AC:L/PR:N/UI:N/S:U/C:N/I:N/A:N
    cwe-id: CWE-200
  metadata:
    max-request: 1
    verified: true
    shodan-query: html:"Bitnami Apache Solr Stack"
  tags: panel,apache,solr,bitnami,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}/"

    matchers:
      - type: dsl
        dsl:
          - 'status_code == 200'
          - 'contains(body, "Bitnami Apache Solr Stack")'
          - 'contains(body, "Apache Solr is now installed")'
          - 'contains(body, "Access Apache Solr")'
          - '(contains(body, "Bitnami Apache Solr Stack") || contains(body, "Apache Solr"))'
        condition: and
