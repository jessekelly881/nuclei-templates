id: bitnami-apache-solr

info:
  name: Bitnami Apache Solr Stack - Detection
  author: Th3l0newolf
  severity: info
  description: |
    Bitnami Apache Solr Stack welcome page was detected.
  classification:
    cvss-metrics: CVSS:3.0/AV:N/AC:L/PR:N/UI:N/S:U/C:N/I:N/A:N
    cwe-id: CWE-200
  metadata:
    max-request: 1
    verified: true
    shodan-query: html:"Bitnami Apache Solr Stack"
  tags: detect,apache,solr,bitnami,discovery,tech

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 3

    matchers:
      - type: dsl
        dsl:
          - 'status_code == 200'
          - 'contains(body, "Bitnami Apache Solr Stack")'
        condition: and
