id: seldon-core-detect

info:
  name: Seldon Core - Detect
  author: rxerium
  severity: info
  description: |
   Seldon Core was detected. Seldon Core is an open-source MLOps/LLMOps framework for deploying, monitoring, and scaling machine learning models on Kubernetes. Its Pipeline Gateway component, which routes inference requests between chained model pipelines, exposes an unauthenticated status endpoint returning a fixed JSON banner ("name":"seldon-pipelinegateway") and a matching Server response header on every path, including the root. Exposed instances may reveal internal ML pipeline configuration and provide a foothold for further probing of the inference API.
  reference:
    - https://github.com/SeldonIO/seldon-core
    - https://docs.seldon.ai/seldon-core-2
  metadata:
    verified: true
    max-request: 1
    vendor: seldonio
    product: seldon-core
    shodan-query: '"seldon-pipelinegateway"'
  tags: tech,seldon-core,ml,ai,mlops,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}/"

    matchers-condition: and
    matchers:
      - type: regex
        part: body
        regex:
          - '"name":\s*"seldon-pipelinegateway"'

      - type: word
        part: header
        words:
          - "seldon-pipelinegateway"
